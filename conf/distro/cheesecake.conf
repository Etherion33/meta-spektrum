# This is an example distro conf. Here is where you can customize the
# policies about how your embedded Linux system should be
# configured. Writing one is so simple that it does not make sense to not
# do it.

DISTRO = "cheesecake"
DISTRO_NAME = "cheesecake"
DISTRO_VERSION = "1.0"

# Set features we want on all KISS devices. Also disables any features not
# explicitly mentioned.
DISTRO_FEATURES = "systemd ipv4 ipv6 wifi zeroconf usbgadget usbhost pni-names"

require conf/distro/include/yocto-uninative.inc
require conf/distro/include/no-static-libs.inc
INHERIT += "uninative" 
# Use the uninative class to get native tools built with -static, so they can be used on the host system without needing to install any extra libraries.

# We want to use the systemd init system, so we need to add it to the list of
# required packages.
INIT_MANAGER = "systemd"

# We want to use the deb package format, so we need to add the package_deb class to the list of package classes.
PACKAGE_CLASSES += "package_deb" 