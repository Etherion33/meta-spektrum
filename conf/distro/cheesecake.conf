# Cheesecake distribution policy for Spektrum devices.

DISTRO = "cheesecake"
DISTRO_NAME = "cheesecake"
DISTRO_VERSION = "1.0"

# Keep distro additions explicit without replacing upstream defaults.
DISTRO_FEATURES:append = " systemd wifi zeroconf usbgadget usbhost"
DISTRO_FEATURES:remove = "x11 wayland"
DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit"

require conf/distro/include/yocto-uninative.inc
require conf/distro/include/no-static-libs.inc
require conf/distro/include/cheesecake-spektrum.inc

INHERIT += "uninative"

INIT_MANAGER = "systemd"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = ""
VIRTUAL-RUNTIME_dev_manager ?= "udev"

PACKAGE_CLASSES ?= "package_deb"